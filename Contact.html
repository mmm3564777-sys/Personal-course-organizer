<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact Us - Mohammed</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <div class="brand">MOHAMMED</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="my-courses.html">My Courses</a></li>
        <li><a href="add-course.html">Add Course</a></li>
        <li><a class="active" href="contact.html">Contact US</a></li>
      </ul>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
    </nav>
  </header>

  <main>
    <section class="contact-section">
      <h2>Contact Us</h2>
      <form class="contact-form" action="#" method="post" onsubmit="alert('Message sent (demo).'); return false;">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Enter your name" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="Enter your email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Enter your message" required></textarea>

        <button class="btn" type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 Personal Course Organizer • All Rights Reserved</p>
  </footer>

  <script>
    const toggle = document.querySelector('.menu-toggle');
    const nav = document.querySelector('.nav-links');
    toggle.addEventListener('click', () => nav.classList.toggle('open'));
  </script>
</body>
</html>
